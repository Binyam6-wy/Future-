<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የእንግሊዘኛ ማስተካከያ AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ዋናው የኮንቴይነር ክፍል -->
    <div class="chat-container">
        <h2>English AI Corrector</h2>
        <p class="subtitle">ጽሑፍህን እዚህ አስገባና ስህተቱን ያስተካክልልህ!</p>

        <!-- መልእክቶች የሚታዩበት ቦታ -->
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                Hello! Write any English sentence, and I will correct it for you.
            </div>
        </div>

        <!-- ጽሑፍ መጻፊያ እና መላኪያ ፎርም -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="እዚህ ላይ የእንግሊዘኛ ጽሑፍ ይጻፉ...">
            <button id="sendBtn">ላክ</button>
        </div>
    </div>

</body>
</html>
